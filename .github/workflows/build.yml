name: Build

on:
  push:
    branches: [ main ]        # 每次 push 到 main 分支时触发

jobs:
  build:
    runs-on: windows-latest   # ⚠️ 必须用 Windows，因为用了 Windows API

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 缓存依赖（加速编译）
        uses: Swatinem/rust-cache@v2

      - name: 编译
        run: cargo build --release

      - name: 上传 exe 文件
        uses: actions/upload-artifact@v4
        with:
          name: volume-control
          path: target/release/volume-control.exe